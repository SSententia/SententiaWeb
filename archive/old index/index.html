<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <link rel="preload" href="../../LOCAL/FONTS/stat_ft.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="../../CSS/glostyle.css" type="text/css" media="all">
  <style>
    .home-page {
      background-image: url(https://file.garden/aGaA2pIcQiyAwVuB/SYSTEM_RESOURCES/IMAGES/STARS.webp);
      background-size: 200%;
      background-repeat: repeat;
      background-position: center;
      transition: background-position 0.1s;
      overflow: hidden
    }

    .glow {
      font-size: 80px;
      color: #53ff78;
      text-align: center;
      animation: glow 1s ease-in-out infinite alternate-reverse;
      height: auto;
      width: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'stat ft';
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #53ff78, 0 0 20px #53ff78, 0 0 30px #28ae65, 0 0 40px #28ae65, 0 0 50px #28ae65, 0 0 60px #28ae65, 0 0 70px #28ae65;
      }

      to {
        text-shadow: 0 0 20px #53ff78, 0 0 30px #6fca83, 0 0 40px #6fca83, 0 0 50px #6fca83, 0 0 60px #6fca83, 0 0 70px #6fca83, 0 0 80px #6fca83;
      }
    }
  </style>

<body class="home-page">
  <!--First edit 02/07/2025 11:42 <3. AND THEN I PROCASTINATED AND NOW IT'S--->
  <!--ACTUALLY IN DEVELOPMENT IN 21/12/2025-->
  <script>
    // background parallax
    let lastCall = 0;
    document.addEventListener('mousemove', function (e) {
      const now = Date.now();
      if (now - lastCall < 16) return;
      lastCall = now;
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      const posX = 20 + x * 50;
      const posY = 20 + y * 50;
      document.body.style.backgroundPosition = `${posX}% ${posY}%`;
    });
  </script>
  <div class="glow">SOON.</div>
</body>
