  <script>
    // Background parallax
    let lastCall = 0;
    document.addEventListener('mousemove', function (e) {
      const now = Date.now();
      if (now - lastCall < 16) return;
      lastCall = now;
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      const posX = 20 + x * 50;
      const posY = 20 + y * 50;
      document.body.style.backgroundPosition = `${posX}% ${posY}%`;
    });
  </script>
